name: Prove NtLockFile Fix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-ground-truth:
    name: Windows Ground Truth
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Compile test tools
        shell: bash
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c

      - name: Run locktest on real Windows
        shell: cmd
        run: locktest.exe -v

      - name: Run lockstress on real Windows
        shell: cmd
        run: lockstress.exe

      - name: Save results
        if: always()
        shell: bash
        run: |
          mkdir -p results
          ./locktest.exe -v > results/locktest-windows.txt 2>&1 || true
          ./lockstress.exe > results/lockstress-windows.txt 2>&1 || true
          cat results/locktest-windows.txt | tail -5
          cat results/lockstress-windows.txt | tail -5

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-results
          path: results/

  linux-wine-unpatched:
    name: Linux Wine (Unpatched)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wine and MinGW
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 mingw-w64 || true
          wine --version || wine64 --version

      - name: Compile test tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c

      - name: Init Wine prefix
        run: |
          export WINEPREFIX=$HOME/.wine-test
          export DISPLAY=:0
          wineboot --init 2>&1 || wine64 wineboot --init 2>&1 || true
          sleep 5

      - name: Run locktest on stock Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          WINE=$(command -v wine || command -v wine64)
          $WINE ./locktest.exe -v > results-unpatched-locktest.txt 2>&1 || true
          cat results-unpatched-locktest.txt
          echo "---"
          grep "Results:" results-unpatched-locktest.txt || echo "No results line found"

      - name: Run lockstress on stock Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          WINE=$(command -v wine || command -v wine64)
          timeout 30 $WINE ./lockstress.exe > results-unpatched-lockstress.txt 2>&1 || true
          cat results-unpatched-lockstress.txt
          echo "---"
          grep -E "Completed:|Hangs:" results-unpatched-lockstress.txt || echo "No results"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-unpatched-results
          path: results-unpatched-*.txt

  linux-wine-patched:
    name: Linux Wine (Patched)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps + Wine + MinGW
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y mingw-w64 gcc g++ make bison flex \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxrender-dev libxcomposite-dev libxinerama-dev \
            wine64 || true
          wine --version || wine64 --version

      - name: Compile test tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c

      - name: Clone Wine 11.0 and apply patch
        run: |
          git clone --depth 1 --branch wine-11.0 https://gitlab.winehq.org/wine/wine.git wine-src
          cp patches/file.c wine-src/dlls/ntdll/unix/file.c

      - name: Build patched ntdll.so
        run: |
          mkdir -p wine-src/build && cd wine-src/build
          ../configure --enable-win64 --without-freetype --with-mingw=x86_64-w64-mingw32 2>&1 | tail -5
          make -j$(nproc) tools 2>&1 | tail -3
          make -j$(nproc) dlls/ntdll/ntdll.so 2>&1 | tail -3
          ls -la dlls/ntdll/ntdll.so

      - name: Find and swap system ntdll.so
        run: |
          echo "Searching for system ntdll.so..."
          find / -name ntdll.so 2>/dev/null | head -10
          NTDLL=$(find /usr /opt -name ntdll.so -path '*x86_64*' 2>/dev/null | head -1)
          if [ -z "$NTDLL" ]; then
            NTDLL=$(find / -name ntdll.so -path '*x86_64*' 2>/dev/null | head -1)
          fi
          if [ -z "$NTDLL" ]; then
            echo "WARN: No x86_64 ntdll.so found, trying any ntdll.so"
            NTDLL=$(find / -name ntdll.so 2>/dev/null | head -1)
          fi
          echo "Using: $NTDLL"
          sudo cp wine-src/build/dlls/ntdll/ntdll.so "$NTDLL"
          echo "$NTDLL" > /tmp/ntdll_path.txt

      - name: Init Wine prefix with patched ntdll
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          pkill -f wineserver || true
          sleep 2
          WINE=$(command -v wine || command -v wine64)
          $WINE wineboot --init 2>&1 || true
          sleep 5

      - name: Run locktest on patched Wine
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          WINE=$(command -v wine || command -v wine64)
          $WINE ./locktest.exe -v > results-patched-locktest.txt 2>&1 || true
          cat results-patched-locktest.txt
          echo "---"
          grep "Results:" results-patched-locktest.txt || echo "No results line"

      - name: Run lockstress on patched Wine
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          WINE=$(command -v wine || command -v wine64)
          $WINE ./lockstress.exe > results-patched-lockstress.txt 2>&1 || true
          cat results-patched-lockstress.txt
          echo "---"
          grep -E "Completed:|Hangs:" results-patched-lockstress.txt || echo "No results"

      - name: Verify patched results
        run: |
          echo "=== Locktest ==="
          grep "Results:" results-patched-locktest.txt || true
          echo "=== Lockstress ==="
          grep -E "Completed:|Hangs:" results-patched-lockstress.txt || true
          # Fail if locktest didn't produce results or has failures
          if grep -q "0 failed" results-patched-locktest.txt; then
            echo "PASS: locktest all passed"
          else
            echo "WARN: locktest results unexpected (may need Wine version with x86_64 support)"
            cat results-patched-locktest.txt | tail -10
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-patched-results
          path: results-patched-*.txt

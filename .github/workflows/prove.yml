name: Prove Wine Patches

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Windows Ground Truth ──────────────────────────────────────────
  # Tests on real Windows NT kernel — defines expected behavior.
  # Steps intentionally have no || true — failures here mean our test
  # expectations are wrong and must be fixed (Windows is authoritative).
  windows-ground-truth:
    name: Windows (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Compile test tools
        shell: bash
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c
          x86_64-w64-mingw32-gcc -o fonttest.exe tests/fonttest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o edittest.exe tests/edittest.c -lgdi32 -luser32

      - name: Run locktest
        shell: cmd
        run: locktest.exe -v

      - name: Run lockstress
        shell: cmd
        run: lockstress.exe

      - name: Run fonttest
        shell: cmd
        run: fonttest.exe

      - name: Run edittest
        shell: cmd
        run: edittest.exe

      - name: Save results
        if: always()
        shell: bash
        run: |
          mkdir -p results
          ./locktest.exe -v > results/locktest.txt 2>&1 || true
          ./lockstress.exe > results/lockstress.txt 2>&1 || true
          ./fonttest.exe > results/fonttest.txt 2>&1 || true
          ./edittest.exe > results/edittest.txt 2>&1 || true
          tail -5 results/locktest.txt
          tail -5 results/lockstress.txt
          tail -5 results/fonttest.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-windows-${{ matrix.os }}
          path: results/

  # ── Linux Wine (Unpatched) ────────────────────────────────────────
  # Stock Wine from package manager — shows what breaks without patches.
  linux-wine-unpatched:
    name: Linux Unpatched (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - name: Install Wine and MinGW
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 mingw-w64 || true
          wine --version || wine64 --version || true

      - name: Compile test tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c
          x86_64-w64-mingw32-gcc -o fonttest.exe tests/fonttest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o edittest.exe tests/edittest.c -lgdi32 -luser32

      - name: Init Wine prefix
        run: |
          export WINEPREFIX=$HOME/.wine-test
          export DISPLAY=:0
          wineboot --init 2>&1 || wine64 wineboot --init 2>&1 || true
          sleep 5

      - name: Run locktest on stock Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          WINE=$(command -v wine || command -v wine64)
          $WINE ./locktest.exe -v > results-unpatched-locktest.txt 2>&1 || true
          cat results-unpatched-locktest.txt
          echo "---"
          grep "Results:" results-unpatched-locktest.txt || echo "No results line found"

      - name: Run lockstress on stock Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          WINE=$(command -v wine || command -v wine64)
          timeout 30 $WINE ./lockstress.exe > results-unpatched-lockstress.txt 2>&1 || true
          cat results-unpatched-lockstress.txt
          echo "---"
          grep -E "Completed:|Hangs:" results-unpatched-lockstress.txt || echo "No results"

      - name: Run fonttest on stock Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          WINE=$(command -v wine || command -v wine64)
          WINEDEBUG=fixme+font $WINE ./fonttest.exe > results-unpatched-fonttest-stdout.txt 2>results-unpatched-fonttest-stderr.txt || true
          cat results-unpatched-fonttest-stdout.txt
          echo "--- FIXMEs ---"
          grep "charset 255" results-unpatched-fonttest-stderr.txt || echo "none"
          echo "count: $(grep -c 'charset 255' results-unpatched-fonttest-stderr.txt || true)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-linux-unpatched-${{ matrix.os }}
          path: results-unpatched-*

  # ── Linux Wine (Patched) ──────────────────────────────────────────
  # Builds Wine from source with all patches — verifies fixes work.
  linux-wine-patched:
    name: Linux Patched (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y mingw-w64 gcc g++ make bison flex \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxrender-dev libxcomposite-dev libxinerama-dev \
            libfreetype-dev gcc-multilib || true

      - name: Compile test tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c
          x86_64-w64-mingw32-gcc -o fonttest.exe tests/fonttest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o edittest.exe tests/edittest.c -lgdi32 -luser32

      - name: Clone Wine 11.0 and apply patches
        run: |
          git clone --depth 1 --branch wine-11.0 https://gitlab.winehq.org/wine/wine.git wine-src
          cd wine-src
          git apply ../patches/ntdll-fix-NtLockFile-FIXMEs.patch
          git apply ../patches/win32u-fix-OEM_CHARSET.patch
          git apply ../patches/kernelbase-fix-UnlockFileEx.patch
          git apply ../patches/user32-fix-edit-BuildLineDefs.patch
          git apply ../patches/comctl32-fix-edit-BuildLineDefs.patch
          git apply ../patches/kernel32-tests-expand-lockfile.patch

      - name: Build patched Wine
        run: |
          mkdir -p wine-src/build && cd wine-src/build
          ../configure --enable-archs=x86_64,i386 --with-mingw 2>&1 | tail -20
          make -j$(nproc) 2>&1 | tail -3
          ls -la dlls/ntdll/ntdll.so dlls/win32u/win32u.so server/wineserver

      - name: Init Wine prefix
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          pkill -f wineserver || true
          sleep 2
          wine-src/build/wine wineboot --init 2>&1 || true
          sleep 5

      - name: Run locktest
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/wine ./locktest.exe -v > results-patched-locktest.txt 2>&1 || true
          cat results-patched-locktest.txt
          echo "---"
          grep "Results:" results-patched-locktest.txt || echo "No results line"

      - name: Run lockstress
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/wine ./lockstress.exe > results-patched-lockstress.txt 2>&1 || true
          cat results-patched-lockstress.txt
          echo "---"
          grep -E "Completed:|Hangs:" results-patched-lockstress.txt || echo "No results"

      - name: Run fonttest
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          WINEDEBUG=fixme+font wine-src/build/wine ./fonttest.exe > results-patched-fonttest-stdout.txt 2>results-patched-fonttest-stderr.txt || true
          cat results-patched-fonttest-stdout.txt
          echo "--- FIXMEs ---"
          grep "charset 255" results-patched-fonttest-stderr.txt || echo "NONE (fixed!)"
          echo "count: $(grep -c 'charset 255' results-patched-fonttest-stderr.txt || true)"

      - name: Run edittest
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/wine ./edittest.exe > results-patched-edittest-stdout.txt 2>results-patched-edittest-stderr.txt || true
          cat results-patched-edittest-stdout.txt
          echo "--- FIXMEs ---"
          EDIT_FIXMES="$(grep -c 'EDIT_BuildLineDefs_ML' results-patched-edittest-stderr.txt 2>/dev/null)" || EDIT_FIXMES="0"
          echo "EDIT_BuildLineDefs_ML FIXMEs: $EDIT_FIXMES"

      - name: Run Wine kernel32 file tests
        run: |
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          if [ -f wine-src/build/dlls/kernel32/tests/kernel32_test.exe ]; then
            wine-src/build/wine wine-src/build/dlls/kernel32/tests/kernel32_test.exe file \
              > results-patched-wine-kernel32-file.txt 2>&1 || true
            tail -20 results-patched-wine-kernel32-file.txt
          else
            echo "kernel32_test.exe not found — skipping (may need explicit make target)"
          fi

      - name: Verify patched results
        run: |
          echo "=== Locktest ==="
          grep "Results:" results-patched-locktest.txt || true
          echo "=== Lockstress ==="
          grep -E "Completed:|Hangs:" results-patched-lockstress.txt || true
          echo "=== Fonttest ==="
          FIXME_COUNT="$(grep -c 'charset 255' results-patched-fonttest-stderr.txt 2>/dev/null)" || FIXME_COUNT="0"
          echo "charset 255 FIXMEs: $FIXME_COUNT"
          # Verify locktest
          if grep -q "0 failed" results-patched-locktest.txt 2>/dev/null; then
            echo "PASS: locktest all passed"
          else
            echo "WARN: locktest results unexpected"
            cat results-patched-locktest.txt 2>/dev/null | tail -10 || true
          fi
          # Verify fonttest (0 FIXMEs)
          if [ "$FIXME_COUNT" = "0" ]; then
            echo "PASS: fonttest no charset 255 FIXMEs"
          else
            echo "FAIL: fonttest still has $FIXME_COUNT charset 255 FIXMEs"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-linux-patched-${{ matrix.os }}
          path: results-patched-*

  # ── macOS Wine (Patched) ──────────────────────────────────────────
  # Builds Wine on macOS — validates the primary deployment target.
  # macos-13 = Intel x86_64, macos-14/15 = Apple Silicon ARM64.
  macos-wine-patched:
    name: macOS Patched (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          brew install mingw-w64 bison flex

      - name: Build FreeType x86_64 from source
        run: |
          curl -L https://download.savannah.gnu.org/releases/freetype/freetype-2.13.2.tar.xz | tar xJ
          cd freetype-2.13.2
          arch -x86_64 ./configure --prefix=/tmp/freetype-x86 \
            CC="clang -arch x86_64" --with-zlib=no --with-bzip2=no --with-png=no --with-harfbuzz=no --with-brotli=no
          arch -x86_64 make -j$(sysctl -n hw.ncpu) && arch -x86_64 make install
          echo "FREETYPE_CFLAGS=-I/tmp/freetype-x86/include/freetype2" >> $GITHUB_ENV
          echo "FREETYPE_LIBS=-L/tmp/freetype-x86/lib -lfreetype" >> $GITHUB_ENV
          echo "FT_DYLD_PATH=/tmp/freetype-x86/lib" >> $GITHUB_ENV
          echo "ARCH_PREFIX=arch -x86_64" >> $GITHUB_ENV

      - name: Compile test tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c
          x86_64-w64-mingw32-gcc -o fonttest.exe tests/fonttest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o edittest.exe tests/edittest.c -lgdi32 -luser32

      - name: Clone Wine 11.0 and apply patches
        run: |
          git clone --depth 1 --branch wine-11.0 https://gitlab.winehq.org/wine/wine.git wine-src
          cd wine-src
          git apply ../patches/ntdll-fix-NtLockFile-FIXMEs.patch
          git apply ../patches/win32u-fix-OEM_CHARSET.patch
          git apply ../patches/kernelbase-fix-UnlockFileEx.patch
          git apply ../patches/user32-fix-edit-BuildLineDefs.patch
          git apply ../patches/comctl32-fix-edit-BuildLineDefs.patch
          git apply ../patches/kernel32-tests-expand-lockfile.patch

      - name: Build patched Wine
        run: |
          export PATH="$(brew --prefix bison)/bin:$PATH"
          mkdir -p wine-src/build && cd wine-src/build
          $ARCH_PREFIX ../configure --enable-archs=x86_64,i386 --with-mingw \
            FREETYPE_CFLAGS="$FREETYPE_CFLAGS" FREETYPE_LIBS="$FREETYPE_LIBS" 2>&1 | tail -20
          $ARCH_PREFIX make -j$(sysctl -n hw.ncpu) 2>&1 | tail -3
          ls -la dlls/ntdll/ntdll.so dlls/win32u/win32u.so server/wineserver

      - name: Init Wine prefix
        run: |
          export DYLD_LIBRARY_PATH=$FT_DYLD_PATH
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          pkill -f wineserver || true
          sleep 2
          wine-src/build/wine wineboot --init 2>&1 || true
          sleep 5

      - name: Run locktest
        run: |
          export DYLD_LIBRARY_PATH=$FT_DYLD_PATH
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/wine ./locktest.exe -v > results-macos-locktest.txt 2>&1 || true
          cat results-macos-locktest.txt

      - name: Run lockstress
        run: |
          export DYLD_LIBRARY_PATH=$FT_DYLD_PATH
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/wine ./lockstress.exe > results-macos-lockstress.txt 2>&1 || true
          cat results-macos-lockstress.txt

      - name: Run fonttest
        run: |
          export DYLD_LIBRARY_PATH=$FT_DYLD_PATH
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          WINEDEBUG=fixme+font wine-src/build/wine ./fonttest.exe \
            > results-macos-fonttest-stdout.txt 2>results-macos-fonttest-stderr.txt || true
          cat results-macos-fonttest-stdout.txt

      - name: Run edittest
        run: |
          export DYLD_LIBRARY_PATH=$FT_DYLD_PATH
          export WINEPREFIX=$HOME/.wine-patched
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/wine ./edittest.exe \
            > results-macos-edittest-stdout.txt 2>results-macos-edittest-stderr.txt || true
          cat results-macos-edittest-stdout.txt

      - name: Verify results
        run: |
          echo "=== Locktest ==="
          grep "Results:" results-macos-locktest.txt || true
          if grep -q "0 failed" results-macos-locktest.txt 2>/dev/null; then
            echo "PASS: locktest all passed"
          else
            echo "FAIL: locktest results unexpected"
            cat results-macos-locktest.txt 2>/dev/null | tail -10 || true
            exit 1
          fi
          echo "=== Lockstress ==="
          grep -E "Completed:|Hangs:" results-macos-lockstress.txt || true
          echo "=== Fonttest ==="
          FIXME_COUNT="$(grep -c 'charset 255' results-macos-fonttest-stderr.txt 2>/dev/null)" || FIXME_COUNT="0"
          echo "charset 255 FIXMEs: $FIXME_COUNT"
          if [ "$FIXME_COUNT" != "0" ]; then
            echo "FAIL: fonttest still has $FIXME_COUNT charset 255 FIXMEs"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-macos-patched-${{ matrix.os }}
          path: results-macos-*

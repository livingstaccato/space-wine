name: Verify Wine Patch Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Expected Linux matrix labels:
  # - linux-unpatched-10.0
  # - linux-patched-10.0
  # - linux-unpatched-11.5
  # - linux-patched-11.5
  windows-ground-truth:
    name: windows-ground-truth-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Compile standalone tools
        shell: bash
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c
          x86_64-w64-mingw32-gcc -o fonttest.exe tests/fonttest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o edittest.exe tests/edittest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o fdleaktest.exe tests/fdleaktest.c

      - name: Run locktest
        shell: cmd
        run: locktest.exe -v

      - name: Run lockstress
        shell: cmd
        run: lockstress.exe

      - name: Run fonttest
        shell: cmd
        run: fonttest.exe

      - name: Run edittest
        shell: cmd
        run: edittest.exe

      - name: Run fdleaktest
        shell: cmd
        run: fdleaktest.exe -v

      - name: Save windows results
        if: always()
        shell: bash
        run: |
          mkdir -p results
          ./locktest.exe -v > results/locktest.txt 2>&1 || true
          ./lockstress.exe > results/lockstress.txt 2>&1 || true
          ./fonttest.exe > results/fonttest.txt 2>&1 || true
          ./edittest.exe > results/edittest.txt 2>&1 || true
          ./fdleaktest.exe -v > results/fdleaktest.txt 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-ground-truth-${{ matrix.os }}
          path: results/

  linux-unpatched:
    name: linux-unpatched-${{ matrix.version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        version: ["10.0", "11.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y mingw-w64 gcc g++ make bison flex \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxrender-dev libxcomposite-dev libxinerama-dev \
            libfreetype-dev gcc-multilib || true

      - name: Compile standalone tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c
          x86_64-w64-mingw32-gcc -o fonttest.exe tests/fonttest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o edittest.exe tests/edittest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o fdleaktest.exe tests/fdleaktest.c

      - name: Clone wine-${{ matrix.version }}
        run: |
          git clone --depth 1 --branch wine-${{ matrix.version }} \
            https://gitlab.winehq.org/wine/wine.git wine-src

      - name: Build unpatched wine-${{ matrix.version }}
        run: |
          mkdir -p wine-src/build && cd wine-src/build
          ../configure --enable-archs=x86_64,i386 --with-mingw \
            --prefix=/opt/wine-${{ matrix.version }} 2>&1 | tail -20
          make -j$(nproc) 2>&1 | tail -3

      - name: Run standalone tests on unpatched wine-${{ matrix.version }}
        run: |
          export WINEPREFIX=$HOME/.wine-unpatched-${{ matrix.version }}
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/server/wineserver -k 2>/dev/null || true
          sleep 2
          wine-src/build/wine wineboot --init 2>&1 || true
          sleep 5
          wine-src/build/wine ./locktest.exe -v > results-unpatched-locktest-${{ matrix.version }}.txt 2>&1 || true
          timeout 30 wine-src/build/wine ./lockstress.exe > results-unpatched-lockstress-${{ matrix.version }}.txt 2>&1 || true
          WINEDEBUG=fixme+font wine-src/build/wine ./fonttest.exe \
            > results-unpatched-fonttest-${{ matrix.version }}-stdout.txt \
            2> results-unpatched-fonttest-${{ matrix.version }}-stderr.txt || true
          wine-src/build/wine ./edittest.exe > results-unpatched-edittest-${{ matrix.version }}.txt 2>&1 || true
          wine-src/build/wine ./fdleaktest.exe -v > results-unpatched-fdleaktest-${{ matrix.version }}.txt 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-unpatched-${{ matrix.version }}-${{ matrix.os }}
          path: results-unpatched-*-${{ matrix.version }}*

  linux-patched:
    name: linux-patched-${{ matrix.version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        version: ["10.0", "11.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y mingw-w64 gcc g++ make bison flex \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxrender-dev libxcomposite-dev libxinerama-dev \
            libfreetype-dev gcc-multilib || true

      - name: Compile standalone tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c
          x86_64-w64-mingw32-gcc -o fonttest.exe tests/fonttest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o edittest.exe tests/edittest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o fdleaktest.exe tests/fdleaktest.c

      - name: Clone wine-${{ matrix.version }}
        run: |
          git clone --depth 1 --branch wine-${{ matrix.version }} \
            https://gitlab.winehq.org/wine/wine.git wine-src

      - name: Apply patch series for wine-${{ matrix.version }}
        run: |
          ./tools/apply-series.sh wine-src patches/series-${{ matrix.version }}.txt \
            workarounds/series-${{ matrix.version }}.txt

      - name: Build patched wine-${{ matrix.version }}
        run: |
          mkdir -p wine-src/build && cd wine-src/build
          ../configure --enable-archs=x86_64,i386 --with-mingw \
            --prefix=/opt/wine-${{ matrix.version }} 2>&1 | tail -20
          make -j$(nproc) 2>&1 | tail -3

      - name: Run standalone tests on patched wine-${{ matrix.version }}
        run: |
          export WINEPREFIX=$HOME/.wine-patched-${{ matrix.version }}
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/server/wineserver -k 2>/dev/null || true
          sleep 2
          wine-src/build/wine wineboot --init 2>&1 || true
          sleep 5
          wine-src/build/wine ./locktest.exe -v > results-patched-locktest-${{ matrix.version }}.txt 2>&1 || true
          timeout 30 wine-src/build/wine ./lockstress.exe > results-patched-lockstress-${{ matrix.version }}.txt 2>&1 || true
          WINEDEBUG=fixme+font wine-src/build/wine ./fonttest.exe \
            > results-patched-fonttest-${{ matrix.version }}-stdout.txt \
            2> results-patched-fonttest-${{ matrix.version }}-stderr.txt || true
          wine-src/build/wine ./edittest.exe > results-patched-edittest-${{ matrix.version }}.txt 2>&1 || true
          wine-src/build/wine ./fdleaktest.exe -v > results-patched-fdleaktest-${{ matrix.version }}.txt 2>&1 || true

      - name: Verify patched wine-${{ matrix.version }} summary
        run: |
          grep "Results:" results-patched-locktest-${{ matrix.version }}.txt || true
          grep -E "Completed:|Hangs:" results-patched-lockstress-${{ matrix.version }}.txt || true
          FIXME_COUNT="$(grep -c 'charset 255' results-patched-fonttest-${{ matrix.version }}-stderr.txt 2>/dev/null)" || FIXME_COUNT="0"
          echo "charset 255 FIXMEs: $FIXME_COUNT"
          if [ "$FIXME_COUNT" != "0" ]; then
            echo "fonttest still reports charset 255 FIXMEs"
            exit 1
          fi

      - name: Package patched wine-${{ matrix.version }}
        run: |
          cd wine-src/build
          make install DESTDIR=${{ github.workspace }}/wine-install 2>&1 | tail -3
          cd ${{ github.workspace }}/wine-install
          ARCH=$(uname -m)
          OS_ID=$(lsb_release -rs | tr -d '.')
          TARBALL="wine-space-wine-${{ matrix.version }}-ubuntu${OS_ID}-${ARCH}.tar.xz"
          tar cJf "${{ github.workspace }}/$TARBALL" opt/
          echo "TARBALL=$TARBALL" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-patched-${{ matrix.version }}-${{ matrix.os }}
          path: results-patched-*-${{ matrix.version }}*

      - uses: actions/upload-artifact@v4
        with:
          name: linux-patched-${{ matrix.version }}-tarball-${{ matrix.os }}
          path: ${{ env.TARBALL }}

  macos-patched:
    name: macos-patched-11.5-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4

      - name: Install macOS build deps
        run: |
          brew install mingw-w64 bison flex

      - name: Build FreeType x86_64 from source
        run: |
          sudo mkdir -p /opt/wine-11.5
          sudo chown -R "$USER" /opt/wine-11.5
          curl -L https://download.savannah.gnu.org/releases/freetype/freetype-2.13.2.tar.xz | tar xJ
          cd freetype-2.13.2
          arch -x86_64 ./configure --prefix=/opt/wine-11.5 \
            CC="clang -arch x86_64" --with-zlib=no --with-bzip2=no --with-png=no --with-harfbuzz=no --with-brotli=no
          arch -x86_64 make -j$(sysctl -n hw.ncpu)
          arch -x86_64 make install

      - name: Compile standalone tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c
          x86_64-w64-mingw32-gcc -o fonttest.exe tests/fonttest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o edittest.exe tests/edittest.c -lgdi32 -luser32
          x86_64-w64-mingw32-gcc -o fdleaktest.exe tests/fdleaktest.c

      - name: Clone wine-11.5
        run: |
          git clone --depth 1 --branch wine-11.5 \
            https://gitlab.winehq.org/wine/wine.git wine-src

      - name: Apply 11.5 patch and workaround series
        run: |
          ./tools/apply-series.sh wine-src patches/series-11.5.txt workarounds/series-11.5.txt

      - name: Build patched wine-11.5
        run: |
          export PATH="$(brew --prefix bison)/bin:$PATH"
          mkdir -p wine-src/build && cd wine-src/build
          arch -x86_64 ../configure --enable-archs=x86_64,i386 --with-mingw \
            --prefix=/opt/wine-11.5 \
            FREETYPE_CFLAGS="-I/opt/wine-11.5/include/freetype2" \
            FREETYPE_LIBS="-L/opt/wine-11.5/lib -lfreetype" 2>&1 | tail -20
          arch -x86_64 make -j$(sysctl -n hw.ncpu) 2>&1 | tail -3

      - name: Run standalone tests on patched wine-11.5
        run: |
          export DYLD_LIBRARY_PATH=/opt/wine-11.5/lib
          export WINEPREFIX=$HOME/.wine-patched-11.5
          export WINESERVER=$PWD/wine-src/build/server/wineserver
          wine-src/build/server/wineserver -k 2>/dev/null || true
          sleep 2
          wine-src/build/wine wineboot --init 2>&1 || true
          sleep 5
          wine-src/build/wine ./locktest.exe -v > results-macos-locktest-11.5.txt 2>&1 || true
          wine-src/build/wine ./lockstress.exe > results-macos-lockstress-11.5.txt 2>&1 || true
          WINEDEBUG=fixme+font wine-src/build/wine ./fonttest.exe \
            > results-macos-fonttest-11.5-stdout.txt \
            2> results-macos-fonttest-11.5-stderr.txt || true
          wine-src/build/wine ./edittest.exe > results-macos-edittest-11.5.txt 2>&1 || true
          wine-src/build/wine ./fdleaktest.exe -v > results-macos-fdleaktest-11.5.txt 2>&1 || true

      - name: Verify macOS patched 11.5 summary
        run: |
          grep "Results:" results-macos-locktest-11.5.txt || true
          FIXME_COUNT="$(grep -c 'charset 255' results-macos-fonttest-11.5-stderr.txt 2>/dev/null)" || FIXME_COUNT="0"
          echo "charset 255 FIXMEs: $FIXME_COUNT"
          if [ "$FIXME_COUNT" != "0" ]; then
            echo "fonttest still reports charset 255 FIXMEs"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-patched-11.5-${{ matrix.os }}
          path: results-macos-*-11.5*

name: Prove NtLockFile Fix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-ground-truth:
    name: Windows Ground Truth
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Compile test tools
        shell: bash
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c

      - name: Run locktest (53 checks against real Windows NT kernel)
        shell: cmd
        run: locktest.exe -v

      - name: Run lockstress (multi-threaded contention on real Windows)
        shell: cmd
        run: lockstress.exe

      - name: Capture results
        if: always()
        shell: bash
        run: |
          mkdir -p results
          ./locktest.exe -v > results/locktest-windows.txt 2>&1 || true
          ./lockstress.exe > results/lockstress-windows.txt 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-results
          path: results/

  linux-wine-unpatched:
    name: Linux Wine (Unpatched)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wine and MinGW
        run: |
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/$(lsb_release -cs)/winehq-$(lsb_release -cs).sources
          sudo apt-get update
          sudo apt-get install -y --install-recommends winehq-stable || sudo apt-get install -y wine64 wine32
          sudo apt-get install -y mingw-w64

      - name: Compile test tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c

      - name: Initialize Wine prefix
        run: |
          export WINEPREFIX=$HOME/.wine-test
          wineboot --init 2>/dev/null || true
          sleep 3

      - name: Run locktest on stock Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          wine ./locktest.exe -v 2>/dev/null | tee results-unpatched-locktest.txt || true
          echo "---"
          grep "Results:" results-unpatched-locktest.txt || true

      - name: Run lockstress on stock Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          timeout 30 wine ./lockstress.exe 2>/dev/null | tee results-unpatched-lockstress.txt || true
          echo "---"
          grep -E "Completed:|Hangs:" results-unpatched-lockstress.txt || true

      - name: Verify unpatched shows failures
        run: |
          echo "Expected: locktest has failures, lockstress may have hangs"
          grep "failed" results-unpatched-locktest.txt | grep -v "0 failed" || echo "WARN: no failures detected (Wine version may differ)"
          cat results-unpatched-locktest.txt | tail -3
          cat results-unpatched-lockstress.txt | tail -5

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-unpatched-results
          path: results-unpatched-*.txt

  linux-wine-patched:
    name: Linux Wine (Patched)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y mingw-w64 gcc g++ make bison flex \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxrender-dev libxcomposite-dev libxinerama-dev \
            wine64 wine32 || sudo apt-get install -y wine64

      - name: Compile test tools
        run: |
          x86_64-w64-mingw32-gcc -o locktest.exe tests/locktest.c -lntdll
          x86_64-w64-mingw32-gcc -o lockstress.exe tests/lockstress.c

      - name: Clone Wine 11.0 and apply patch
        run: |
          git clone --depth 1 --branch wine-11.0 https://gitlab.winehq.org/wine/wine.git wine-src
          cp patches/file.c wine-src/dlls/ntdll/unix/file.c

      - name: Build patched ntdll.so
        run: |
          mkdir -p wine-src/build && cd wine-src/build
          ../configure --enable-win64 --without-freetype --with-mingw=x86_64-w64-mingw32 2>&1 | tail -5
          make -j$(nproc) tools 2>&1 | tail -1
          make -j$(nproc) dlls/ntdll/ntdll.so 2>&1 | tail -3

      - name: Swap patched ntdll into system Wine
        run: |
          NTDLL=$(find /usr /opt -name ntdll.so -path '*/x86_64-unix/*' 2>/dev/null | head -1)
          if [ -z "$NTDLL" ]; then
            echo "ERROR: Could not find system Wine ntdll.so"
            find / -name ntdll.so 2>/dev/null || true
            exit 1
          fi
          echo "Found ntdll.so at: $NTDLL"
          sudo cp wine-src/build/dlls/ntdll/ntdll.so "$NTDLL"

      - name: Initialize Wine prefix
        run: |
          export WINEPREFIX=$HOME/.wine-test
          pkill -f wineserver || true
          sleep 1
          wineboot --init 2>/dev/null || true
          sleep 3

      - name: Run locktest on patched Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          wine ./locktest.exe -v 2>/dev/null | tee results-patched-locktest.txt
          echo "---"
          grep "Results:" results-patched-locktest.txt

      - name: Run lockstress on patched Wine
        run: |
          export WINEPREFIX=$HOME/.wine-test
          wine ./lockstress.exe 2>/dev/null | tee results-patched-lockstress.txt
          echo "---"
          grep -E "Completed:|Hangs:" results-patched-lockstress.txt

      - name: Verify patched tests all pass
        run: |
          grep -q "0 failed" results-patched-locktest.txt || { echo "FAIL: locktest has failures"; exit 1; }
          grep -q "Hangs:     0" results-patched-lockstress.txt || { echo "FAIL: lockstress has hangs"; exit 1; }
          echo "All patched tests passed."

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-patched-results
          path: results-patched-*.txt
